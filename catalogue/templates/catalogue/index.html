<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfrikaStyle - Vos inspirations Mode</title>
    <!-- Polices Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fcfbf9; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        
        .hero { 
            background: url('https://i.ibb.co/kVmtzKbf/Chat-GPT-Image-2-juin-2026-12-43-09.png'); 
            background-size: cover; 
            background-position: center; 
            height: 400px; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        
        .card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .product-img { height: 300px; object-fit: cover; border-radius: 15px 15px 0 0; cursor: pointer; }
        .badge { background-color: #d4a373 !important; }
    </style>
</head>
<body>

    <!-- Bannière Hero -->
    <header class="hero mb-5">
        <div>
            <h1 class="display-2">AfrikaStyle</h1>
            <p class="lead">L'élégance du continent à portée de clic.</p>
        </div>
    </header>

    <!-- Section Catalogue -->
    <div class="container">
        <h2 class="mb-5 text-center">Nos Coups de Cœur</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for product in products %}
            <div class="col">
                <div class="card h-100 shadow-lg">
                    <!-- Image cliquable pour agrandir dans un nouvel onglet -->
                    <a href="{{ product.image_url }}" target="_blank">
                        <img src="{{ product.image_url }}" class="card-img-top product-img" alt="{{ product.title }}">
                    </a>
                    
                    <div class="card-body d-flex flex-column">
                        <span class="badge mb-2 align-self-start">{{ product.category.name }}</span>
                        <h5 class="card-title fw-bold">{{ product.title }}</h5>
                        
                        <!-- Bouton d'appel à l'action direct -->
                        <a href="{{ product.affiliate_url }}" 
                           target="_blank" 
                           class="btn btn-dark w-100 mt-auto" 
                           title="Choisir ma taille sur Amazon">
                           Choisir ma taille
                        </a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p class="text-muted">Aucun produit disponible pour le moment.</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
