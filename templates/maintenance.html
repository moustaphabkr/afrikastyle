<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            
            /* Ton image sans filtre sombre pour garder sa luminosité naturelle */
            background-image: url('https://i.ibb.co/VcgVFVXV/maintenance.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            text-align: center;
            padding: 40px;
            color: #fdf5e6; /* Couleur crème douce */
        }

        .logo {
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: #d4a373;
        }

        /* Titre principal : Le plus large */
        h1 {
            font-size: 4.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #e5c1a0;
            line-height: 1.1;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3); /* Légère ombre pour la lisibilité */
        }

        /* Premier sous-titre : Moyen */
        .subtitle-main {
            font-size: 2em;
            margin: 10px 0;
            font-weight: 400;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Deuxième sous-titre : Le plus petit */
        .subtitle-small {
            font-size: 1.5em;
            margin: 5px 0;
            font-weight: 300;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AFRIKASTYLE</div>
        
        <h1>Maintenance en cours</h1>
        
        <div class="subtitle-main">Nous revenons très bientôt.</div>
        <div class="subtitle-small">Merci pour votre patience.</div>
    </div>
</body>
</html>
