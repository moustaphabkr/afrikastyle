<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif; /* Police élégante et classique */
            
            /* Utilisation directe de ton image, sans filtre sombre */
            background-image: url('https://i.ibb.co/VcgVFVXV/maintenance.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            text-align: center;
            padding: 40px;
            /* Une couleur crème très légère pour le texte, bien lisible sur le fond chaud */
            color: #fdf5e6; 
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            /* Couleur dorée douce pour correspondre à l'ambiance */
            color: #e5c1a0; 
        }

        p {
            font-size: 1.3em;
            margin: 10px 0;
            font-weight: 300;
        }

        .logo {
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: #d4a373;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AFRIKASTYLE</div>
        <h1>Nous revenons très bientôt</h1>
        <p>MERCI POUR VOTRE PATIENCE</p>
    </div>
</body>
</html>
